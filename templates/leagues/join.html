{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Join a League" %} — Oval'Pronos{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
  <i class="ti ti-door-enter page-header-icon" style="color: var(--color-primary);"></i>
  <h1 class="mb-0">{% trans "Join a League" %}</h1>
</div>

<div class="row justify-content-center">
  <div class="col-12 col-md-6">
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="invite_code" class="form-label">{% trans "Invite Code" %}</label>
            <input type="text" id="invite_code" name="invite_code" class="form-control font-monospace text-uppercase"
                   maxlength="5" placeholder="XXXXX" autocomplete="off" autofocus
                   value="{{ initial_code }}">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="ti ti-door-enter me-1"></i>{% trans "Join" %}
            </button>
            <a href="{% url 'leagues:list' %}" class="btn btn-outline-secondary">{% trans "Cancel" %}</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
