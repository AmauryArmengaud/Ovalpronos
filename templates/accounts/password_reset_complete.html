{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Password changed" %} — Oval'Pronos{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-8 col-lg-5">
    <div class="card">
      <div class="card-header text-center py-3">
        <h4 class="mb-0"><i class="ti ti-circle-check me-2"></i>{% trans "Password changed!" %}</h4>
      </div>
      <div class="card-body p-4 text-center">
        <i class="ti ti-shield-check" style="font-size: 3rem; color: var(--color-icon-muted);"></i>
        <p class="mt-3 mb-4">
          {% trans "Your password has been changed successfully. You can now log in." %}
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg">
          <i class="ti ti-login me-2"></i>{% trans "Log in" %}
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
