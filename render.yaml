services:
  # ─── Web service ────────────────────────────────────────────────────────────
  - type: web
    name: ovalpronos
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: gunicorn ovalpronos.wsgi:application --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: ovalpronos-db
          property: connectionString
      - key: APISPORTS_KEY
        sync: false                # Set manually in Render dashboard
      - key: RUGBY_SEASON
        value: 2024-2025
      - key: SYNC_SECRET_TOKEN
        sync: false                # Set manually — must match GitHub secret SYNC_SECRET_TOKEN
      - key: EMAIL_HOST
        value: smtp.ionos.fr
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_HOST_USER
        value: noreply@ovalpronos.com
      - key: EMAIL_HOST_PASSWORD
        sync: false                # Set manually in Render dashboard
      - key: DEFAULT_FROM_EMAIL
        value: Oval'Pronos <noreply@ovalpronos.com>

# Sync is handled by GitHub Actions — no Render cron needed.

# ─── Database ────────────────────────────────────────────────────────────────
databases:
  - name: ovalpronos-db
    databaseName: ovalpronos
    user: ovalpronos
    plan: free
